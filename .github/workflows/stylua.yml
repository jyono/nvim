# Check Lua formatting with StyLua
name: StyLua
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  stylua-check:
    name: StyLua check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .
